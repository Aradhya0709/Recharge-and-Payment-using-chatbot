# ==========================================
# PayBot - Application Configuration
# ==========================================

# Server Configuration
server.port=8082

# ==========================================
# MySQL Database Configuration
# ==========================================
# IMPORTANT: Change username and password to match YOUR MySQL setup
# Default MySQL credentials: username=root, password=root
# If your password is different, change it below!
spring.datasource.url=jdbc:mysql://localhost:3306/paybot_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
# ddl-auto=update: Hibernate auto-creates/updates tables based on entity classes
# This means tables are automatically created when the app starts!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=PayBotSecretKey2024PayBotSecretKey2024PayBotSecretKey2024
app.jwt.expiration-ms=86400000

# ==========================================
# Jackson JSON Configuration
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ==========================================
# Logging Configuration
# ==========================================
logging.level.com.paybot=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
